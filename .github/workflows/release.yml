# LangKeep Release Pipeline
#
# Triggered by pushing a version tag (e.g., v0.1.0, v1.0.0).
# Produces:
#   - LangKeep-{version}-portable-x64.zip  (portable, self-contained)
#   - LangKeep-{version}-x64.msix          (MSIX installer)
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: Release
  PROJECT_WPF: src/LangKeep.UI.Wpf/LangKeep.UI.Wpf.csproj
  SOLUTION: LangKeep.sln
  MANIFEST_DIR: src/LangKeep.Packaging

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Tag: $tag"
          Write-Host "Version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish WPF application
        run: |
          dotnet publish ${{ env.PROJECT_WPF }} `
            --configuration ${{ env.CONFIGURATION }} `
            --runtime win-x64 `
            --self-contained true `
            --output "${{ runner.temp }}/publish/portable" `
            -p:DebugType=none `
            -p:FileVersion=${{ steps.version.outputs.version }} `
            -p:InformationalVersion=${{ steps.version.outputs.version }} `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $source = "${{ runner.temp }}/publish/portable"
          $zipName = "LangKeep-$version-portable-x64.zip"
          $zipPath = "${{ runner.temp }}/artifacts/$zipName"
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/artifacts" | Out-Null
          Copy-Item "LICENSE" -Destination "$source/LICENSE.txt" -Force
          Compress-Archive -Path "$source/*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "Created portable package: $zipName"
          echo "portable-path=$zipPath" >> $env:GITHUB_OUTPUT
          echo "portable-name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Prepare and create MSIX package
        id: prepare-msix
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $msixName = "LangKeep-$version-x64.msix"
          $msixPath = "${{ runner.temp }}\artifacts\$msixName"
          $stagingDir = "${{ runner.temp }}\msix-staging"
          $publishDir = "${{ runner.temp }}/publish/portable"

          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}\artifacts" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stagingDir\Resources" | Out-Null

          Write-Host "Copying published files to staging..."
          Copy-Item -Path "$publishDir\*" -Destination $stagingDir -Recurse -Force

          Write-Host "Copying logo resources..."
          Copy-Item -Path "${{ github.workspace }}\${{ env.MANIFEST_DIR }}\Resources\*" `
            -Destination "$stagingDir\Resources\" -Force

          Write-Host "Fixing manifest placeholders..."
          $manifestSrc = "${{ github.workspace }}\${{ env.MANIFEST_DIR }}\Package.appxmanifest"
          $manifestDst = "$stagingDir\AppxManifest.xml"

          $parts = $version.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $msixVersion = $parts[0..3] -join '.'

          $content = [System.IO.File]::ReadAllText($manifestSrc)
          $content = $content.Replace('$targetnametoken$', 'LangKeep')
          $content = $content.Replace('$targetentrypoint$', 'Windows.FullTrustApplication')
          $content = $content -replace 'Version="\d+\.\d+\.\d+\.\d+"', "Version=`"$msixVersion`""
          [System.IO.File]::WriteAllText($manifestDst, $content)

          Write-Host "Manifest prepared with version: $msixVersion"

          $makeAppx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "MakeAppx.exe" `
            | Sort-Object FullName -Descending `
            | Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeAppx) {
            Write-Host "MakeAppx.exe not found. Installing Windows SDK..."
            choco install windows-sdk-10.1 -y --no-progress 2>&1 | Out-Host
            $makeAppx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "MakeAppx.exe" `
              | Sort-Object FullName -Descending `
              | Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $makeAppx) {
            Write-Host "ERROR: MakeAppx.exe not found! Cannot create MSIX."
            exit 1
          }

          Write-Host "Found MakeAppx: $makeAppx"
          & $makeAppx pack /p $msixPath /d $stagingDir /l 2>&1 | Write-Host

          if ($LASTEXITCODE -eq 0) {
            Write-Host "MSIX created successfully: $msixPath"
          } else {
            Write-Host "MSIX creation failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          echo "msix-path=$msixPath" >> $env:GITHUB_OUTPUT
          echo "msix-name=$msixName" >> $env:GITHUB_OUTPUT

      - name: Get signing certificate
        id: cert
        shell: pwsh
        run: |
          $pfxPath = "${{ runner.temp }}\langkeep-cert.pfx"
          $pfxPassword = "LangKeepBuildCert2024"
          $encoded = "${{ secrets.MSIX_SIGNING_CERTIFICATE }}"
          if (-not [string]::IsNullOrEmpty($encoded)) {
            Write-Host "Using certificate from GitHub Secrets..."
            [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($encoded))
            Write-Host "Certificate decoded from MSIX_SIGNING_CERTIFICATE secret"
            $pfxPassword = "${{ secrets.MSIX_SIGNING_PASSWORD }}"
          } else {
            Write-Host "No MSIX_SIGNING_CERTIFICATE secret. Generating self-signed certificate..."
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject "CN=Borislav Enchev, O=LangKeep" `
              -KeyUsage DigitalSignature `
              -FriendlyName "LangKeep Build Certificate" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
              -NotAfter (Get-Date).AddYears(3)
            $securePassword = ConvertTo-SecureString -String $pfxPassword -Force -AsPlainText
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePassword | Out-Null
            Write-Host "Self-signed certificate generated (thumbprint: $($cert.Thumbprint))"
          }
          echo "pfx-path=$pfxPath" >> $env:GITHUB_OUTPUT
          echo "pfx-password=$pfxPassword" >> $env:GITHUB_OUTPUT

      - name: Sign MSIX package
        shell: pwsh
        run: |
          $msixPath = "${{ steps.prepare-msix.outputs.msix-path }}"
          $pfxPath = "${{ steps.cert.outputs.pfx-path }}"
          $pfxPassword = "${{ steps.cert.outputs.pfx-password }}"

          if (-not (Test-Path $msixPath)) {
            Write-Host "WARNING: MSIX not found at $msixPath, skipping signing."
            exit 0
          }
          if (-not (Test-Path $pfxPath)) {
            Write-Host "WARNING: Certificate not found at $pfxPath, skipping signing."
            exit 0
          }

          # Prefer x64 signtool.exe (x86 version fails with ERROR_BAD_FORMAT on x64 MSIX)
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Filter "signtool.exe" -Recurse -Force `
            | Where-Object FullName -like '*\x64\signtool.exe' `
            | Sort-Object FullName -Descending `
            | Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            # Fallback: any architecture
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Filter "signtool.exe" -Recurse -Force `
              | Sort-Object FullName -Descending `
              | Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $signtool) {
            Write-Host "WARNING: signtool.exe not found. MSIX will remain unsigned."
            exit 0
          }

          Write-Host "Signing MSIX with: $signtool"

          & $signtool sign `
            /fd SHA256 `
            /f $pfxPath `
            /p $pfxPassword `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /v `
            $msixPath 2>&1 | Write-Host

          if ($LASTEXITCODE -eq 0) {
            Write-Host "MSIX signed successfully!"
          } else {
            Write-Host "Signing failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: List artifacts
        shell: pwsh
        run: |
          Write-Host "Generated artifacts:"
          Get-ChildItem -Path "${{ runner.temp }}\artifacts" -Recurse | Select-Object Name, Length | Format-Table -AutoSize

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LangKeep ${{ steps.version.outputs.version }}
          body: |
            ## LangKeep ${{ steps.version.outputs.version }}

            ### Downloads

            - **MSIX Installer**: `LangKeep-${{ steps.version.outputs.version }}-x64.msix` (self-signed)
            - **Portable ZIP**: `LangKeep-${{ steps.version.outputs.version }}-portable-x64.zip`

            ### Installation

            **MSIX**: Download, double-click, click **More info -> Run anyway**, and install.

            **Portable**: Download the ZIP, extract, and run `LangKeep.exe`. No installation needed.

            ### System Requirements

            - Windows 10 (version 1809+) or Windows 11
            - x64 processor
          draft: false
          prerelease: false
          files: |
            ${{ runner.temp }}/artifacts/LangKeep-${{ steps.version.outputs.version }}-x64.msix
            ${{ runner.temp }}/artifacts/LangKeep-${{ steps.version.outputs.version }}-portable-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
